services:
  # Single production service: API + static SPA on one URL.
  # Live: https://inventari-frontend.onrender.com
  - type: web
    name: inventari-frontend
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm -w backend run start
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://inventari-frontend.onrender.com
      - key: login_email
        sync: false
      - key: login_password
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_API_BASE_URL
        value: https://inventari-frontend.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: PORT
        value: 3001
